<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1fb"/>
      <stop offset="1" stop-color="#f7f8fd"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5b6bd6" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1000" height="560" fill="url(#bg2)"/>

  <!-- Nav bar -->
  <rect x="180" y="56" width="640" height="70" rx="18" fill="#ffffff" filter="url(#shadow2)"/>
  <g font-size="15" fill="#334155" text-anchor="middle">
    <rect x="206" y="74" width="82" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="247" y="96">Server</text>
  </g>
  <!-- active pill: Client -->
  <rect x="298" y="74" width="84" height="34" rx="17" fill="#6d5de6"/>
  <text x="340" y="96" font-size="15" fill="#ffffff" text-anchor="middle">Client</text>
  <g font-size="15" fill="#334155" text-anchor="middle">
    <rect x="392" y="74" width="80" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="432" y="96">Admin</text>
    <rect x="482" y="74" width="92" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="528" y="96">Settings</text>
  </g>
  <!-- avatar -->
  <circle cx="784" cy="91" r="22" fill="#3bbdf0"/>
  <circle cx="784" cy="85" r="7" fill="#ffffff"/>
  <path d="M772 103 a12 9 0 0 1 24 0 z" fill="#ffffff"/>

  <!-- Client card -->
  <rect x="180" y="150" width="640" height="380" rx="22" fill="#ffffff" filter="url(#shadow2)"/>
  <!-- phone icon -->
  <g transform="translate(452,180)" fill="none" stroke="#334155" stroke-width="2.2" stroke-linejoin="round">
    <rect x="0" y="0" width="18" height="28" rx="4"/>
    <line x1="6.5" y1="23" x2="11.5" y2="23" stroke-linecap="round"/>
  </g>
  <text x="482" y="200" font-size="24" font-weight="700" fill="#1e293b">Client component</text>

  <!-- Field rows -->
  <g font-size="15" fill="#334155">
    <rect x="204" y="230" width="592" height="48" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="226" y="259">ID</text>

    <rect x="204" y="290" width="592" height="48" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="226" y="319">Name</text>

    <rect x="204" y="350" width="592" height="48" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="226" y="379">Email</text>

    <rect x="204" y="410" width="592" height="48" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="226" y="439">Role</text>

    <rect x="204" y="470" width="592" height="48" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="226" y="499">Two Factor Authentication</text>
  </g>
  <!-- OFF badge -->
  <rect x="700" y="480" width="74" height="28" rx="14" fill="#e0566a"/>
  <text x="737" y="499" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">OFF</text>
</svg>

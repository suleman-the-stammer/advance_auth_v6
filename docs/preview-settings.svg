<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1fb"/>
      <stop offset="1" stop-color="#f7f8fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5b6bd6" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="url(#bg)"/>

  <!-- Nav bar -->
  <rect x="180" y="56" width="640" height="70" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <!-- inactive pills -->
  <g font-size="15" fill="#334155" text-anchor="middle">
    <rect x="206" y="74" width="82" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="247" y="96">Server</text>
    <rect x="298" y="74" width="80" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="338" y="96">Client</text>
    <rect x="388" y="74" width="80" height="34" rx="17" fill="#ffffff" stroke="#e6e8ef"/>
    <text x="428" y="96">Admin</text>
  </g>
  <!-- active pill -->
  <rect x="478" y="74" width="96" height="34" rx="17" fill="#6d5de6"/>
  <text x="526" y="96" font-size="15" fill="#ffffff" text-anchor="middle">Settings</text>
  <!-- avatar -->
  <circle cx="784" cy="91" r="22" fill="#3bbdf0"/>
  <circle cx="784" cy="85" r="7" fill="#ffffff"/>
  <path d="M772 103 a12 9 0 0 1 24 0 z" fill="#ffffff"/>

  <!-- Settings card -->
  <rect x="180" y="150" width="640" height="320" rx="22" fill="#ffffff" filter="url(#shadow)"/>
  <!-- gear icon -->
  <g transform="translate(466,192)" fill="#475569">
    <g>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(45)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(90)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(135)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(180)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(225)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(270)"/>
      <rect x="-2.6" y="-15" width="5.2" height="7" rx="1.5" transform="rotate(315)"/>
    </g>
    <circle r="10.5"/>
    <circle r="4.2" fill="#ffffff"/>
  </g>
  <text x="484" y="200" font-size="24" font-weight="700" fill="#1e293b">Settings</text>

  <!-- Name field -->
  <text x="212" y="248" font-size="14" font-weight="600" fill="#334155">Name</text>
  <rect x="204" y="260" width="592" height="46" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="226" y="288" font-size="15" fill="#94a3b8">John Doe</text>

  <!-- Role field -->
  <text x="212" y="340" font-size="14" font-weight="600" fill="#334155">Role</text>
  <rect x="204" y="352" width="592" height="46" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="226" y="380" font-size="15" fill="#334155">Select a role</text>
  <g stroke="#94a3b8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="766,373 771,368 776,373"/>
    <polyline points="766,379 771,384 776,379"/>
  </g>

  <!-- Save button -->
  <rect x="204" y="416" width="92" height="42" rx="11" fill="#6d5de6"/>
  <text x="250" y="443" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Save</text>
</svg>
